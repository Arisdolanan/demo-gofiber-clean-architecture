services:
  postgres:
    image: postgres:15.14-alpine
    container_name: postgres_container
    environment:
      POSTGRES_DB: gofiber
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Jakarta
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - service-network
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin4_container
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped
    networks:
      - service-network
  redis:
    image: redis:7-alpine
    container_name: redis_container
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - service-network
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq_container
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - service-network
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper_container
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - service-network
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka_container
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'gofiber-kafka-cluster'
    networks:
      - service-network
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui_container
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "9442:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - service-network
  portainer:
    image: portainer/portainer-ce:alpine
    container_name: portainer_container
    ports:
      - 9443:9443
    volumes:
      - portainer_data:/var/lib/portainer/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - service-network
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gofiber_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - kafka
    volumes:
      - ./storage:/root/storage
    environment:
      - APP_DATABASE_POSTGRES_HOST=postgres
      - APP_DATABASE_POSTGRES_PORT=5432
      - APP_DATABASE_POSTGRES_USERNAME=postgres
      - APP_DATABASE_POSTGRES_PASSWORD=postgres
      - APP_DATABASE_POSTGRES_DBNAME=gofiber
      - APP_DATABASE_REDIS_URL=redis:6379
      - APP_DATABASE_REDIS_PASSWORD=
      - APP_DATABASE_REDIS_DB=0
      - APP_MESSAGING_RABBITMQ_HOST=rabbitmq
      - APP_MESSAGING_RABBITMQ_PORT=5672
      - APP_MESSAGING_RABBITMQ_USERNAME=guest
      - APP_MESSAGING_RABBITMQ_PASSWORD=guest
      - APP_MESSAGING_RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - APP_MESSAGING_KAFKA_BROKERS=kafka:29092
      - APP_MESSAGING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    networks:
      - service-network
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gofiber_worker
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - kafka
    volumes:
      - ./storage:/root/storage
    environment:
      - APP_DATABASE_POSTGRES_HOST=postgres
      - APP_DATABASE_POSTGRES_PORT=5432
      - APP_DATABASE_POSTGRES_USERNAME=postgres
      - APP_DATABASE_POSTGRES_PASSWORD=postgres
      - APP_DATABASE_POSTGRES_DBNAME=gofiber
      - APP_DATABASE_REDIS_URL=redis:6379
      - APP_DATABASE_REDIS_PASSWORD=
      - APP_DATABASE_REDIS_DB=0
      - APP_MESSAGING_RABBITMQ_HOST=rabbitmq
      - APP_MESSAGING_RABBITMQ_PORT=5672
      - APP_MESSAGING_RABBITMQ_USERNAME=guest
      - APP_MESSAGING_RABBITMQ_PASSWORD=guest
      - APP_MESSAGING_RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - APP_MESSAGING_KAFKA_BROKERS=kafka:29092
      - APP_MESSAGING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    command: ["./worker"]
    networks:
      - service-network
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  pgadmin_data:
  portainer_data:

networks:
  service-network:
    driver: bridge