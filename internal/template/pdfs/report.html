<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Report</title>
    <style>
        body {
            font-family: 'DejaVu Sans', 'Liberation Sans', 'Ubuntu', Arial, sans-serif;
            margin: 20px;
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .report-summary {
            background-color: #f5f5f5;
            padding: 15px;
            margin-bottom: 20px;
            font-family: 'DejaVu Sans', 'Liberation Sans', 'Ubuntu', Arial, sans-serif;
        }
        .report-data {
            margin-bottom: 20px;
        }
        .report-data table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'DejaVu Sans', 'Liberation Sans', 'Ubuntu', Arial, sans-serif;
        }
        .report-data th, .report-data td {
            border: 1px solid #000;
            padding: 8px;
            text-align: left;
        }
        .report-data th {
            background-color: #e0e0e0;
        }
        .chart {
            margin: 20px 0;
            text-align: center;
            font-family: 'DejaVu Sans', 'Liberation Sans', 'Ubuntu', Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{.ReportTitle}}</h1>
        <p>Period: {{.Period}}</p>
        <p>Generated on: {{.GeneratedDate}}</p>
    </div>

    <div class="report-summary">
        <h2>Summary</h2>
        <p>{{.Summary}}</p>
    </div>

    <div class="report-data">
        <h2>Detailed Data</h2>
        <table>
            <thead>
                <tr>
                    {{range .Headers}}
                    <th>{{.}}</th>
                    {{end}}
                </tr>
            </thead>
            <tbody>
                {{range .DataRows}}
                <tr>
                    {{range .}}
                    <td>{{.}}</td>
                    {{end}}
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>

    <div class="chart">
        <h2>Visualization</h2>
        <p>{{.ChartPlaceholder}}</p>
    </div>
</body>
</html>
