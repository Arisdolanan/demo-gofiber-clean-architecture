<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Invoice</title>
    <style>
        body {
            font-family: 'DejaVu Sans', 'Liberation Sans', 'Ubuntu', Arial, sans-serif;
            margin: 20px;
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .invoice-details {
            margin-bottom: 20px;
        }
        .invoice-details table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'DejaVu Sans', 'Liberation Sans', 'Ubuntu', Arial, sans-serif;
        }
        .invoice-details th, .invoice-details td {
            border: 1px solid #000;
            padding: 8px;
            text-align: left;
        }
        .total {
            text-align: right;
            font-weight: bold;
            margin-top: 20px;
            font-family: 'DejaVu Sans', 'Liberation Sans', 'Ubuntu', Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>INVOICE</h1>
        <p>Invoice #: {{.InvoiceNumber}}</p>
        <p>Date: {{.Date}}</p>
    </div>

    <div class="invoice-details">
        <h2>Bill To:</h2>
        <p>{{.CustomerName}}</p>
        <p>{{.CustomerAddress}}</p>

        <h2>Items:</h2>
        <table>
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Quantity</th>
                    <th>Unit Price</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                {{range .Items}}
                <tr>
                    <td>{{.Description}}</td>
                    <td>{{.Quantity}}</td>
                    <td>{{.UnitPrice}}</td>
                    <td>{{.Total}}</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>

    <div class="total">
        <p>Total Amount: {{.TotalAmount}}</p>
    </div>
</body>
</html>
